<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5EBD7">
<title>墾丁兩天一夜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    /* Sand & sea backdrop */
    --bg: #EFEDDC;
    --bg-soft: #E5E2CD;
    --paper: #FAF9F2;

    /* Deep navy ink */
    --ink: #0C2336;
    --ink-soft: #2A4356;
    --ink-mute: #7E8C95;

    /* Sage lines */
    --line: #C9D2C2;
    --line-soft: #E0E6D8;

    /* OCEAN spectrum (primary) */
    --ocean: #0891B2;
    --ocean-deep: #0E5C73;
    --ocean-soft: #67E8F9;

    --teal: #0D9488;
    --teal-deep: #115E59;
    --teal-soft: #5EEAD4;

    --jade: #06B6D4;
    --jade-soft: #A5F3FC;

    /* PALM spectrum (primary) */
    --palm: #059669;
    --palm-deep: #047857;
    --palm-soft: #6EE7B7;

    --leaf: #65A30D;
    --moss: #4D7C0F;

    /* Sparing warm accents (used in moderation) */
    --coral: #F97316;
    --sun: #FBBF24;
    --sun-deep: #B45309;
    --pink: #EC4899;
    --sand: #D4A574;
  }
  *,*::before,*::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: "Noto Sans TC", system-ui, sans-serif;
    background: linear-gradient(180deg, #EFEDDC 0%, #E5EAD8 60%, #DCE8DA 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    overflow-x: hidden;
    min-height: 100vh;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 8% 6%, rgba(8,145,178,0.16), transparent 40%),
      radial-gradient(circle at 92% 14%, rgba(5,150,105,0.12), transparent 38%),
      radial-gradient(circle at 88% 88%, rgba(13,148,136,0.14), transparent 42%),
      radial-gradient(circle at 12% 92%, rgba(101,163,13,0.10), transparent 38%);
    pointer-events: none;
    z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 18px 80px; }
  .serif { font-family: "Noto Serif TC", "Cormorant Garamond", Georgia, serif; }
  .mono { font-family: "JetBrains Mono", "SF Mono", Menlo, monospace; }

  /* HEADER */
  .hero {
    padding: 36px 0 22px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
    position: relative;
    overflow: visible;
  }
  .hero::after {
    content: "";
    position: absolute;
    top: 14px; right: -10px;
    width: 110px; height: 110px;
    background: radial-gradient(circle at center, var(--sun) 0%, rgba(251,191,36,0.4) 35%, transparent 65%);
    border-radius: 50%;
    opacity: 0.45;
    z-index: -1;
    filter: blur(3px);
  }
  .hero-eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ocean-deep);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
  }
  .hero-eyebrow::before {
    content:""; flex: 0 0 28px; height: 2px; background: var(--ocean);
    border-radius: 2px;
  }
  .hero-title {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: clamp(38px, 9.5vw, 60px);
    line-height: 1.0;
    margin: 0 0 8px;
    letter-spacing: -0.025em;
    background: linear-gradient(115deg, var(--ocean-deep) 0%, var(--teal) 50%, var(--palm) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    position: relative;
    z-index: 1;
  }
  .hero-title-edit {
    background: transparent; border: none; padding: 0; margin: 0;
    font: inherit;
    width: 100%;
    outline: none;
    -webkit-text-fill-color: initial;
    color: var(--ink);
  }
  .hero-title-edit:focus { box-shadow: 0 2px 0 var(--coral); }
  .hero-meta {
    display: flex; flex-wrap: wrap;
    gap: 8px 18px;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 16px;
    position: relative;
    z-index: 1;
  }
  .hero-meta-item {
    display: inline-flex; align-items: center; gap: 6px;
    font-weight: 500;
  }
  .hero-meta-item svg { color: var(--ocean); flex-shrink: 0; }

  /* SYNC STATUS PILL */
  .sync-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    font: 500 11px "JetBrains Mono", monospace;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    background: var(--paper);
    transition: all 0.15s;
  }
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ink-mute);
    flex-shrink: 0;
  }
  .sync-synced { color: var(--palm-deep); border-color: var(--palm-soft); background: rgba(110,231,183,0.15); }
  .sync-synced .sync-dot { background: var(--palm); box-shadow: 0 0 0 3px rgba(5,150,105,0.18); }
  .sync-saving { color: var(--ocean-deep); border-color: var(--ocean-soft); background: rgba(103,232,249,0.15); }
  .sync-saving .sync-dot { background: var(--ocean); animation: pulse 1s infinite; }
  .sync-loading { color: var(--ocean-deep); border-color: var(--ocean-soft); background: rgba(103,232,249,0.15); }
  .sync-loading .sync-dot { background: var(--ocean); animation: pulse 1s infinite; }
  .sync-error { color: var(--coral); border-color: var(--coral); background: rgba(249,115,22,0.1); cursor: pointer; }
  .sync-error .sync-dot { background: var(--coral); }
  .sync-local { color: var(--ink-mute); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .hero-actions {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px;
    position: relative;
    z-index: 1;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--ink);
    background: transparent;
    font: 500 12px "Noto Sans TC", sans-serif;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn-primary { background: var(--ocean); color: var(--paper); border-color: var(--ocean); }
  .btn-primary:hover { background: var(--ink); border-color: var(--ink); }
  .btn-coral { background: var(--coral); color: var(--paper); border-color: var(--coral); }
  .btn-coral:hover { background: #A03B25; border-color: #A03B25; }
  .btn-ghost { border-color: var(--line); color: var(--ink-soft); }
  .btn-ghost:hover { background: var(--paper); color: var(--ink); border-color: var(--ink-soft); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-icon { padding: 7px; border-radius: 50%; }

  /* INFO CARD (HSR) */
  .info-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 28px;
    box-shadow: 6px 6px 0 rgba(14,165,188,0.18);
    position: relative;
  }
  .info-card::before {
    content: "";
    position: absolute;
    left: -1px; top: -1px; bottom: -1px;
    width: 4px;
    background: linear-gradient(180deg, var(--ocean) 0%, var(--coral) 100%);
    border-radius: 4px 0 0 4px;
  }
  .info-card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    cursor: pointer;
  }
  .info-card-title {
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 19px;
    display: flex; align-items: center; gap: 10px;
    margin: 0;
    color: var(--ink);
  }
  .info-card-title-num {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    background: var(--ocean);
    color: var(--paper);
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.12em;
    font-weight: 700;
  }
  .hsr-grid {
    display: grid; grid-template-columns: 1fr; gap: 14px;
    font-size: 13px;
  }
  @media (min-width: 560px) { .hsr-grid { grid-template-columns: 1fr 1fr; gap: 18px; } }
  .hsr-leg {
    border-left: 2px solid var(--ocean);
    padding-left: 14px;
  }
  .hsr-leg.return { border-color: var(--coral); }
  .hsr-leg-label {
    font: 600 10px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ocean);
    margin-bottom: 6px;
  }
  .hsr-leg.return .hsr-leg-label { color: var(--coral); }
  .hsr-route {
    font-family: "Noto Serif TC", serif;
    font-weight: 600;
    font-size: 17px;
    margin-bottom: 8px;
  }

  /* RENTAL CARD */
  .info-card-rental::before {
    background: linear-gradient(180deg, var(--palm) 0%, var(--ocean) 100%) !important;
  }
  .rental-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 12px;
  }
  @media (max-width: 480px) { .rental-grid { grid-template-columns: 1fr; gap: 10px; } }
  .rental-block {
    background: rgba(5,150,105,0.06);
    border-radius: 4px;
    padding: 10px 12px;
    border-left: 3px solid var(--palm);
  }
  .rental-grid .rental-block:nth-child(2) {
    background: rgba(249,115,22,0.06);
    border-left-color: var(--coral);
  }
  .rental-block-label {
    font: 600 10px "JetBrains Mono", monospace;
    letter-spacing: 0.2em;
    margin-bottom: 6px;
  }
  .rental-block-main {
    font-family: "Noto Serif TC", serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .rental-block-time {
    font: 500 13px "JetBrains Mono", monospace;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  .rental-extras {
    grid-column: 1 / -1;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
    margin-top: 2px;
  }
  .hsr-detail { display: flex; gap: 8px; align-items: baseline; font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
  .hsr-detail-label { font: 500 10px "JetBrains Mono", monospace; letter-spacing: 0.05em; color: var(--ink-mute); min-width: 50px; }
  .hsr-booked {
    background: rgba(8,145,178,0.06);
    border-radius: 4px;
    padding: 8px 11px;
    margin-bottom: 10px;
    border-left: 3px solid var(--ocean);
  }
  .hsr-booked-row {
    display: flex; align-items: baseline; gap: 10px;
    font-size: 14px;
    margin-bottom: 3px;
  }
  .hsr-booked-row:last-child { margin-bottom: 0; }
  .hsr-booked-row span:first-child {
    color: var(--ocean-deep);
    font: 600 10px "JetBrains Mono", monospace;
    letter-spacing: 0.12em;
    min-width: 32px;
  }
  .hsr-booked-row strong {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    color: var(--ink);
  }

  /* DAY SECTION */
  .day {
    margin-bottom: 40px;
    position: relative;
  }
  .day-header {
    display: flex; align-items: flex-end; gap: 14px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    position: relative;
  }
  .day-header::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--day-accent, var(--coral)) 0%, var(--day-accent, var(--coral)) 35%, transparent 100%);
    border-radius: 2px;
  }
  .day-num {
    font-family: "Noto Serif TC", serif;
    font-weight: 900;
    font-size: 72px;
    line-height: 0.82;
    color: var(--day-accent, var(--coral));
    letter-spacing: -0.05em;
    font-style: italic;
    text-shadow: 3px 3px 0 rgba(255,255,255,0.5);
  }
  .day-meta {
    flex: 1; padding-bottom: 6px;
  }
  .day-label {
    font: 600 10px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--day-accent, var(--coral));
    margin-bottom: 8px;
    opacity: 0.85;
  }
  .day-title {
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 23px;
    margin: 0;
    line-height: 1.15;
    color: var(--ink);
  }

  /* TIMELINE */
  .timeline {
    position: relative;
    padding-left: 0;
  }

  /* ITEM CARD */
  .item {
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 4px solid var(--day-accent, var(--ocean));
    border-radius: 4px;
    margin-bottom: 14px;
    position: relative;
    transition: all 0.2s;
    overflow: hidden;
    box-shadow: 2px 2px 0 rgba(13,148,136,0.10);
  }
  .item:hover { box-shadow: 4px 4px 0 rgba(13,148,136,0.18); transform: translate(-1px, -1px); }
  .item.done { opacity: 0.55; box-shadow: 1px 1px 0 var(--line-soft); transform: none; }
  .item.done:hover { transform: none; }
  .item.done .item-name { text-decoration: line-through; text-decoration-color: var(--ink-mute); }
  .item-main {
    padding: 16px 18px;
  }
  .item-top {
    display: flex; gap: 12px; align-items: flex-start;
  }
  .item-time-block {
    flex-shrink: 0;
    text-align: right;
    min-width: 56px;
  }
  .item-time {
    font: 600 16px "JetBrains Mono", monospace;
    color: var(--day-accent, var(--ink));
    letter-spacing: -0.02em;
  }
  .item-duration {
    font: 500 10px "JetBrains Mono", monospace;
    color: var(--ink-mute);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-name {
    font-family: "Noto Serif TC", serif;
    font-weight: 700;
    font-size: 18px;
    line-height: 1.25;
    margin: 0 0 4px;
    color: var(--ink);
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .item-name:hover, .item-name:active { border-bottom-color: var(--ocean); }
  .item-name-link {
    display: inline-flex; align-items: center; gap: 4px;
    color: inherit; text-decoration: none;
  }
  .item-name-link svg { color: var(--ocean); flex-shrink: 0; }
  .item-meta {
    display: flex; flex-wrap: wrap; gap: 6px 10px;
    font-size: 11px;
    color: var(--ink-mute);
    margin-bottom: 8px;
    font-family: "JetBrains Mono", monospace;
    letter-spacing: 0.04em;
  }
  .item-cat {
    display: inline-flex; align-items: center;
    padding: 1px 7px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .cat-景點 { background: rgba(8,145,178,0.16); color: var(--ocean-deep); }
  .cat-餐廳 { background: rgba(249,115,22,0.15); color: var(--coral); }
  .cat-交通 { background: rgba(5,150,105,0.14); color: var(--palm-deep); }
  .cat-住宿 { background: rgba(212,165,116,0.25); color: var(--sun-deep); }
  .cat-活動 { background: rgba(13,148,136,0.16); color: var(--teal-deep); }
  .item-notes {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin: 6px 0 0;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .item-actions {
    display: flex; align-items: center; gap: 4px;
    margin-left: 8px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 32px; height: 32px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: 50%;
    cursor: pointer;
    color: var(--ink-mute);
    transition: all 0.15s;
    padding: 0;
  }
  .icon-btn:active { transform: scale(0.93); }
  .icon-btn:hover { border-color: var(--ink); color: var(--ink); }
  .icon-btn.done-active { background: var(--palm); border-color: var(--palm); color: white; }

  /* PHOTO ON RIGHT */
  .item-photo-right {
    flex-shrink: 0;
    width: 96px;
    cursor: pointer;
    position: relative;
    align-self: flex-start;
  }
  .item-photo-right img {
    width: 96px; height: 96px;
    border-radius: 3px;
    object-fit: cover;
    border: 1px solid var(--line);
    background: var(--bg-soft);
    display: block;
    transition: transform 0.15s;
  }
  .item-photo-right:active img { transform: scale(0.97); }
  .item-photo-count {
    position: absolute;
    bottom: 5px; right: 5px;
    background: rgba(0,0,0,0.78);
    color: white;
    font: 600 10px "JetBrains Mono", monospace;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }
  .item-photo-placeholder {
    width: 96px; height: 96px;
    border: 1.5px dashed var(--line);
    border-radius: 3px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    color: var(--ink-mute);
    background: var(--bg-soft);
    cursor: pointer;
    transition: all 0.15s;
    font: 500 10px "JetBrains Mono", monospace;
    letter-spacing: 0.1em;
  }
  .item-photo-placeholder:hover { border-color: var(--ocean); color: var(--ocean); background: var(--paper); }
  @media (max-width: 400px) {
    .item-photo-right, .item-photo-right img, .item-photo-placeholder { width: 76px; }
    .item-photo-right img, .item-photo-placeholder { height: 76px; }
  }

  /* Action bar */
  .item-action-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--line);
    opacity: 0.95;
  }

  /* PHOTO MODAL NAV */
  .photo-modal-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.15);
    color: white;
    border: none; border-radius: 50%;
    font-size: 28px; line-height: 1;
    cursor: pointer;
    z-index: 10;
    font-family: Georgia, serif;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-modal-nav:active { background: rgba(255,255,255,0.3); }
  .photo-modal-nav.prev { left: 16px; }
  .photo-modal-nav.next { right: 16px; }
  .photo-modal-counter {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    color: white;
    padding: 6px 14px;
    border-radius: 999px;
    font: 500 12px "JetBrains Mono", monospace;
    letter-spacing: 0.1em;
  }

  /* ADD ITEM BUTTON */
  .add-item {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: 4px;
    color: var(--ink-mute);
    font: 500 13px "Noto Sans TC", sans-serif;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.15s;
  }
  .add-item:hover { border-color: var(--ocean); color: var(--ocean); background: var(--paper); }
  .add-item:active { transform: scale(0.99); }

  /* EDIT FORM */
  .edit-form {
    border-top: 1px solid var(--line);
    padding: 16px 18px;
    background: var(--bg-soft);
    animation: slideIn 0.2s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .form-row { margin-bottom: 12px; }
  .form-row-flex { display: flex; gap: 8px; }
  .form-row-flex > * { flex: 1; min-width: 0; }
  .form-label {
    display: block;
    font: 500 10px "JetBrains Mono", monospace;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 5px;
  }

const buildMapsUrl = (item) => {

const formatDuration = (min) => {
  if (!min) return '';
  if (min < 60) return `${min} 分`;
  const h = Math.floor(min / 60), m = min % 60;
  return m ? `${h} 時 ${m} 分` : `${h} 小時`;
};

const compressImage = (file, maxWidth = 800) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onerror = () => reject(new Error('讀取失敗'));
  reader.onload = (e) => {
    const img = new Image();
    img.onerror = () => reject(new Error('解碼失敗'));
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      try {
        resolve(canvas.toDataURL('image/jpeg', 0.78));
      } catch (err) { reject(err); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

// Extract lat/lng or place from a Google Maps URL
const parseMapsUrl = (url) => {
  if (!url) return null;
  // @lat,lng pattern
  const at = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (at) return { lat: parseFloat(at[1]), lng: parseFloat(at[2]) };
  // !3d!4d coordinates
  const d = url.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
  if (d) return { lat: parseFloat(d[1]), lng: parseFloat(d[2]) };
  // q=lat,lng or query=lat,lng or destination=lat,lng
  const q = url.match(/[?&](?:q|query|destination)=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (q) return { lat: parseFloat(q[1]), lng: parseFloat(q[2]) };
  return null;
};

// 部署 code.gs 後把 Web App URL 貼到下面
const GAS_URL = "https://script.google.com/macros/s/AKfycbx9aw_lcqNKTXPUHTQXEJqbtyjjhTVPGghUvPFDCI5m2iQAyGYpgm10FleVvis0avGf7Q/exec";
const CLOUD_ENABLED = !!(GAS_URL && GAS_URL.startsWith("https://"));

const STORAGE_KEY = "kenting_trip_v2";
const OLD_STORAGE_KEYS = ["kenting_trip_v1"];

// Build a name → photos lookup from default data
function buildPhotoMap() {
  const map = {};
  DEFAULT_DATA.days.forEach(day => {
    day.items.forEach(item => {
      if (item.photos && item.photos.length > 0) {
        map[item.name] = item.photos;
      }
    });
  });
  return map;
}

// Fill missing top-level fields with defaults so older saves keep working
function ensureSchema(data) {
  if (!data) return data;
  if (!data.rental) data.rental = JSON.parse(JSON.stringify(DEFAULT_DATA.rental));
  if (data.hsr) {
    ['outbound', 'inbound'].forEach(k => {
      if (data.hsr[k]) {
        if (data.hsr[k].trainNo === undefined) data.hsr[k].trainNo = "";
        if (data.hsr[k].actualTime === undefined) data.hsr[k].actualTime = "";
        if (data.hsr[k].seat === undefined) data.hsr[k].seat = "";
      }
    });
  }
  return data;
}

// Migrate from older storage keys, preserving user edits but enriching with photos
function migrateFromOldKey() {
  const photoMap = buildPhotoMap();
  for (const oldKey of OLD_STORAGE_KEYS) {
    try {
      const raw = localStorage.getItem(oldKey);
      if (!raw) continue;
      const parsed = JSON.parse(raw);
      if (!parsed || !parsed.days) continue;
      parsed.days.forEach(day => {
        day.items.forEach(item => {
          if ((!item.photos || item.photos.length === 0) && photoMap[item.name]) {
            item.photos = [...photoMap[item.name]];
          }
        });
      });
      const completed = ensureSchema(parsed);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(completed));
      return completed;
    } catch (e) { console.warn("migrate failed", oldKey, e); }
  }
  return null;
}

// LOCAL cache (used as offline fallback + initial paint)
function loadLocalCache() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.days) return ensureSchema(parsed);
    }
    const migrated = migrateFromOldKey();
    if (migrated) return migrated;
  } catch (e) { console.warn("local load failed", e); }
  return DEFAULT_DATA;
}

function saveLocalCache(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); return true; }
  catch (e) { console.error("local save failed", e); return false; }
}

// CLOUD API — XMLHttpRequest (mobile Safari compat), text/plain (no CORS preflight)
function cloudGet() {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("GET", GAS_URL + "?_=" + Date.now(), true);
    xhr.timeout = 15000;
    xhr.onload = function() {
      try {
        const resp = JSON.parse(xhr.responseText);
        if (resp.ok) resolve(resp.data);
        else reject(new Error(resp.error || "unknown"));
      } catch (e) { reject(new Error("解析失敗：" + xhr.responseText.slice(0, 80))); }
    };
    xhr.onerror = () => reject(new Error("網路錯誤"));
    xhr.ontimeout = () => reject(new Error("逾時"));
    xhr.send();
  });
}

function cloudSet(data) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("POST", GAS_URL, true);
    xhr.setRequestHeader("Content-Type", "text/plain;charset=utf-8");
    xhr.timeout = 20000;
    xhr.onload = function() {
      try {
        const resp = JSON.parse(xhr.responseText);
        if (resp.ok) resolve(resp);
        else reject(new Error(resp.error || "save failed"));
      } catch (e) { reject(new Error("解析失敗")); }
    };
    xhr.onerror = () => reject(new Error("網路錯誤"));
    xhr.ontimeout = () => reject(new Error("逾時"));
    xhr.send(JSON.stringify({action: "set", data: data}));
  });
}

function cloudUploadPhoto(dataUrl, filename) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("POST", GAS_URL, true);
    xhr.setRequestHeader("Content-Type", "text/plain;charset=utf-8");
    xhr.timeout = 30000;
    xhr.onload = function() {
      try {
        const resp = JSON.parse(xhr.responseText);
        if (resp.ok && resp.url) resolve(resp.url);
        else reject(new Error(resp.error || "upload failed"));
      } catch (e) { reject(new Error("解析失敗")); }
    };
    xhr.onerror = () => reject(new Error("網路錯誤"));
    xhr.ontimeout = () => reject(new Error("逾時"));
    xhr.send(JSON.stringify({action: "uploadPhoto", dataUrl: dataUrl, filename: filename || ""}));
  });
}

// ====================== TOAST ======================
function useToast() {
  const [msg, setMsg] = useState(null);
  const timer = useRef(null);
  const show = (m) => {
    setMsg(m);
    if (timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(() => setMsg(null), 2200);
  };
  const node = msg ? <div className="toast">{msg}</div> : null;
  return [show, node];
}

// ====================== PHOTO MODAL ======================
function PhotoModal({ photos, initialIndex, onClose }) {
  const [idx, setIdx] = useState(initialIndex || 0);
  const total = photos.length;
  const prev = (e) => { if (e) e.stopPropagation(); setIdx(i => (i - 1 + total) % total); };
  const next = (e) => { if (e) e.stopPropagation(); setIdx(i => (i + 1) % total); };
  useEffect(() => {
    const h = (e) => {
      if (e.key === 'Escape') onClose();
      else if (e.key === 'ArrowLeft' && total > 1) prev();
      else if (e.key === 'ArrowRight' && total > 1) next();
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose, total]);
  return (
    <div className="modal-backdrop photo-modal" onClick={onClose}>
      <button className="photo-modal-close" onClick={onClose}>×</button>
      {total > 1 && <button className="photo-modal-nav prev" onClick={prev} aria-label="上一張">‹</button>}
      <img src={photos[idx]} alt="" onClick={e => e.stopPropagation()} />
      {total > 1 && <button className="photo-modal-nav next" onClick={next} aria-label="下一張">›</button>}
      {total > 1 && <div className="photo-modal-counter">{idx + 1} / {total}</div>}
    </div>
  );
}

function ItemEditForm({ item, onSave, onCancel, onAddPhoto, onRemovePhoto, onPasteUrl }) {
  const [draft, setDraft] = useState({...item});
  const fileRef = useRef(null);
  const [urlInput, setUrlInput] = useState('');
  const [uploading, setUploading] = useState(false);

  const update = (k, v) => setDraft(d => ({...d, [k]: v}));

  const handleFile = async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setUploading(true);
    for (const f of files) {
      try {
        const dataUrl = await compressImage(f, 900);
        if (CLOUD_ENABLED) {
          try {
            const cloudUrl = await cloudUploadPhoto(dataUrl, f.name);
            setDraft(d => ({...d, photos: [...(d.photos||[]), cloudUrl]}));
          } catch (cloudErr) {
            console.warn("cloud upload failed, using local base64", cloudErr);
            setDraft(d => ({...d, photos: [...(d.photos||[]), dataUrl]}));
          }
        } else {
          setDraft(d => ({...d, photos: [...(d.photos||[]), dataUrl]}));
        }
      } catch (err) {
        alert('照片處理失敗：' + err.message);
      }
    }
    setUploading(false);
    if (fileRef.current) fileRef.current.value = '';
  };

  const addUrlPhoto = () => {
    const u = urlInput.trim();
    if (!u) return;
    setDraft(d => ({...d, photos: [...(d.photos||[]), u]}));
    setUrlInput('');
  };

  const removePhoto = (idx) => {
    setDraft(d => ({...d, photos: (d.photos||[]).filter((_,i) => i !== idx)}));
  };

  const tryParseUrl = (url) => {
    update('mapsUrl', url);
    const parsed = parseMapsUrl(url);
    if (parsed) {
      update('lat', parsed.lat);
      update('lng', parsed.lng);
    }
  };

  return (
    <div className="edit-form">
      <div className="form-row form-row-flex">
        <div style={{flex: '0 0 90px'}}>
          <label className="form-label">時間</label>

        <div style={{flex: '0 0 88px'}}>
          <label className="form-label">時長(分)</label>
          <input type="number" className="form-input" value={draft.duration || 0} onChange={e => update('duration', parseInt(e.target.value) || 0)} min="0" step="15" />
        </div>
        <div>
          <label className="form-label">類別</label>
          <select className="form-select" value={draft.category || '景點'} onChange={e => update('category', e.target.value)}>
            <option value="景點">景點</option>
            <option value="餐廳">餐廳</option>
            <option value="交通">交通</option>
            <option value="住宿">住宿</option>
            <option value="活動">活動</option>
          </select>
        </div>
      </div>
      <div className="form-row">
        <label className="form-label">名稱</label>
        <input type="text" className="form-input" value={draft.name || ''} onChange={e => update('name', e.target.value)} placeholder="景點 / 餐廳名稱" />
      </div>
      <div className="form-row">
        <label className="form-label">地址</label>
        <input type="text" className="form-input" value={draft.address || ''} onChange={e => update('address', e.target.value)} placeholder="完整地址" />
      </div>
      <div className="form-row">
        <label className="form-label">Google Maps 連結（貼上會自動抓座標）</label>
        <input type="url" className="form-input" value={draft.mapsUrl || ''} onChange={e => tryParseUrl(e.target.value)} placeholder="https://maps.google.com/..." />
        <div className="form-help">
          {draft.lat && draft.lng ? `📍 ${draft.lat.toFixed(4)}, ${draft.lng.toFixed(4)}` : '可貼整段 Maps 網址；或留空也可以，點名稱時會用「名稱+地址」搜尋'}

      {open && !editing && (
        <div className="hsr-grid">
          {renderLeg(hsr.outbound, false)}
          {renderLeg(hsr.inbound, true)}
        </div>
      )}
      {open && editing && (
        <div>
          {['outbound', 'inbound'].map((key, i) => (
            <div key={key} style={{marginBottom: 14, paddingBottom: 14, borderBottom: i === 0 ? '1px solid var(--line)' : 'none'}}>
              <div className="form-label" style={{marginBottom: 8}}>{i === 0 ? '去程' : '回程'}</div>
              <div className="form-row-flex">
                <div><label className="form-label">路線</label><input className="form-input" value={draft[key].route} onChange={e => setDraft(d => ({...d, [key]: {...d[key], route: e.target.value}}))} /></div>
                <div><label className="form-label">建議時間</label><input className="form-input" value={draft[key].suggestedTime} onChange={e => setDraft(d => ({...d, [key]: {...d[key], suggestedTime: e.target.value}}))} /></div>
              </div>
              <div className="form-row-flex" style={{marginTop: 8}}>
                <div><label className="form-label">車程</label><input className="form-input" value={draft[key].duration} onChange={e => setDraft(d => ({...d, [key]: {...d[key], duration: e.target.value}}))} /></div>
                <div><label className="form-label">票價</label><input className="form-input" value={draft[key].price} onChange={e => setDraft(d => ({...d, [key]: {...d[key], price: e.target.value}}))} /></div>
              </div>
              <div style={{background:'var(--bg)', padding:'10px 12px', borderRadius:4, marginTop:10, borderLeft:'3px solid var(--ocean)'}}>
                <div className="form-label" style={{color:'var(--ocean-deep)'}}>訂位資訊（訂完票自己填）</div>
                <div className="form-row-flex" style={{marginTop:6}}>
                  <div><label className="form-label">車次</label><input className="form-input" placeholder="1232" value={draft[key].trainNo || ''} onChange={e => setDraft(d => ({...d, [key]: {...d[key], trainNo: e.target.value}}))} /></div>
                  <div><label className="form-label">時間</label><input className="form-input" placeholder="19:36" value={draft[key].actualTime || ''} onChange={e => setDraft(d => ({...d, [key]: {...d[key], actualTime: e.target.value}}))} /></div>
                  <div><label className="form-label">座位</label><input className="form-input" placeholder="12車6A" value={draft[key].seat || ''} onChange={e => setDraft(d => ({...d, [key]: {...d[key], seat: e.target.value}}))} /></div>
                </div>
              </div>
              <div className="form-row" style={{marginTop: 10}}>
                <label className="form-label">備註</label>
                <input className="form-input" value={draft[key].note} onChange={e => setDraft(d => ({...d, [key]: {...d[key], note: e.target.value}}))} />
              </div>
            </div>
          ))}
          <div className="form-actions">
            <button className="btn btn-ghost btn-sm" onClick={() => {setEditing(false); setDraft(hsr);}}>取消</button>
            <button className="btn btn-primary" onClick={save}>儲存</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ====================== RENTAL CARD ======================
function RentalCard({ rental, onUpdate }) {
  const [open, setOpen] = useState(false);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(rental || {});
  useEffect(() => { setDraft(rental || {}); }, [rental]);

  const save = () => { onUpdate(draft); setEditing(false); };
  const update = (k, v) => setDraft(d => ({...d, [k]: v}));
  const hasInfo = rental && (rental.company || rental.bookingRef);

  return (
    <div className="info-card info-card-rental">
      <div className="info-card-header" onClick={() => setOpen(!open)}>
        <h3 className="info-card-title">
          <span className="info-card-title-num" style={{background:'var(--palm-deep)'}}>CAR</span>
          租車資訊
          {hasInfo && rental.company && <span style={{fontSize:13, color:'var(--ink-mute)', fontWeight:500, fontFamily:'JetBrains Mono, monospace'}}> · {rental.company}</span>}
        </h3>
        <div style={{display:'flex', gap:6, alignItems:'center'}}>
          {open && !editing && <button className="btn btn-ghost btn-sm" onClick={(e) => {e.stopPropagation(); setEditing(true);}}><Icon.Edit/> 編輯</button>}
          <Icon.Chevron open={open} />
        </div>
      </div>
      {open && !editing && (
        <div className="rental-grid">
          <div className="rental-block">
            <div className="rental-block-label" style={{color:'var(--palm-deep)'}}>取車 · PICKUP</div>
            <div className="rental-block-main">{rental.pickupLocation || '—'}</div>
            <div className="rental-block-time">{rental.pickupTime || '—'}</div>
          </div>
          <div className="rental-block">
            <div className="rental-block-label" style={{color:'var(--coral)'}}>還車 · RETURN</div>
            <div className="rental-block-main">{rental.returnLocation || '—'}</div>
            <div className="rental-block-time">{rental.returnTime || '—'}</div>
          </div>
          <div className="rental-extras">
            {rental.company && <div className="hsr-detail"><span className="hsr-detail-label">公司</span> <strong style={{color:'var(--ink)'}}>{rental.company}</strong></div>}
            {rental.bookingRef && <div className="hsr-detail"><span className="hsr-detail-label">訂單編號</span> <strong style={{color:'var(--ink)', fontFamily:'JetBrains Mono, monospace'}}>{rental.bookingRef}</strong></div>}
            {rental.note && <div className="hsr-detail"><span className="hsr-detail-label">備註</span> <span style={{opacity:0.9}}>{rental.note}</span></div>}
          </div>
        </div>
      )}
      {open && editing && (
        <div>
          <div className="form-row">
            <label className="form-label">租車公司</label>
            <input className="form-input" value={draft.company || ''} onChange={e => update('company', e.target.value)} placeholder="格上 / 和運 / Hertz / ..." />
          </div>
          <div className="form-row-flex">
            <div>
              <label className="form-label">取車地點</label>
              <input className="form-input" value={draft.pickupLocation || ''} onChange={e => update('pickupLocation', e.target.value)} />
            </div>
            <div>
              <label className="form-label">取車時間</label>
              <input className="form-input" value={draft.pickupTime || ''} onChange={e => update('pickupTime', e.target.value)} placeholder="週五 20:00" />
            </div>
          </div>
          <div className="form-row-flex" style={{marginTop:10}}>
            <div>
              <label className="form-label">還車地點</label>
              <input className="form-input" value={draft.returnLocation || ''} onChange={e => update('returnLocation', e.target.value)} />
            </div>
            <div>
              <label className="form-label">還車時間</label>
              <input className="form-input" value={draft.returnTime || ''} onChange={e => update('returnTime', e.target.value)} placeholder="週日 17:30" />
            </div>
          </div>
          <div className="form-row" style={{marginTop:10}}>
            <label className="form-label">訂單編號</label>
            <input className="form-input" value={draft.bookingRef || ''} onChange={e => update('bookingRef', e.target.value)} placeholder="訂完車自己填" />
          </div>
          <div className="form-row">
            <label className="form-label">備註</label>
            <textarea className="form-textarea" value={draft.note || ''} onChange={e => update('note', e.target.value)} placeholder="保險、油資、注意事項..." style={{minHeight:60}} />
          </div>
          <div className="form-actions">
            <button className="btn btn-ghost btn-sm" onClick={() => {setEditing(false); setDraft(rental || {});}}>取消</button>
            <button className="btn btn-primary" onClick={save}>儲存</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ====================== DAY ======================
function Day({ day, dayIndex, editingId, onItemEdit, onItemCancelEdit, onItemSave, onItemDelete, onItemMove, onItemToggleDone, onItemAdd, onPhotoClick }) {
  const dayAccents = ['#0891B2', '#059669', '#0D9488', '#06B6D4', '#65A30D'];
  const accent = dayAccents[dayIndex % dayAccents.length];
  return (
    <div className="day" style={{'--day-accent': accent}}>
      <div className="day-header">
        <div className="day-num">{['I','II','III','IV','V'][dayIndex] || (dayIndex+1)}</div>
        <div className="day-meta">
          <div className="day-label">{day.label}</div>
          <h2 className="day-title">{day.title}</h2>
        </div>
      </div>
      <div className="timeline">
        {day.items.map((item, idx) => (
          <ItemCard
            key={item.id}
            item={item}
            isEditing={editingId === item.id}
            onEdit={() => onItemEdit(item.id)}
            onCancelEdit={() => onItemCancelEdit()}
            onSave={(draft) => onItemSave(day.id, item.id, draft)}
            onDelete={() => onItemDelete(day.id, item.id)}
            onToggleDone={() => onItemToggleDone(day.id, item.id)}
            onMove={(dir) => onItemMove(day.id, item.id, dir)}
            onPhotoClick={(photos, idx) => onPhotoClick({photos, index: idx})}
            isFirst={idx === 0}
            isLast={idx === day.items.length - 1}
          />
        ))}
        <button className="add-item" onClick={() => onItemAdd(day.id)}>
          <Icon.Plus /> 新增行程
        </button>
      </div>
    </div>
  );
}

// ====================== APP ======================
function App() {
  const [data, setData] = useState(loadLocalCache);
  const [editingTitle, setEditingTitle] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [photoModal, setPhotoModal] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [toast, toastNode] = useToast();
  const importRef = useRef(null);

  // sync states: 'init' (just loaded cache), 'loading' (fetching cloud), 'synced', 'saving', 'error', 'local'
  const [syncStatus, setSyncStatus] = useState(CLOUD_ENABLED ? 'loading' : 'local');
  const [syncMsg, setSyncMsg] = useState("");
  const saveTimer = useRef(null);
  const skipNextSave = useRef(false);

  // Fetch from cloud on mount
  useEffect(() => {
    if (!CLOUD_ENABLED) return;
    let cancelled = false;
    cloudGet()
      .then(cloudData => {
        if (cancelled) return;
        if (cloudData && cloudData.days) {
          skipNextSave.current = true; // don't echo cloud data back
          setData(ensureSchema(cloudData));
        }
        setSyncStatus('synced');
        setSyncMsg("");
      })
      .catch(err => {
        if (cancelled) return;
        console.warn("cloud load failed", err);
        setSyncStatus('error');
        setSyncMsg(err.message || "雲端載入失敗");
      });
    return () => { cancelled = true; };
  }, []);

  // Save: always update local cache; debounce cloud save
  useEffect(() => {
    saveLocalCache(data);
    if (!CLOUD_ENABLED) return;
    if (skipNextSave.current) { skipNextSave.current = false; return; }
    if (syncStatus === 'loading') return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSyncStatus('saving');
    saveTimer.current = setTimeout(() => {
      cloudSet(data)
        .then(() => { setSyncStatus('synced'); setSyncMsg(""); })
        .catch(err => { setSyncStatus('error'); setSyncMsg(err.message || "儲存失敗"); });
    }, 1500);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
  }, [data]);

  const refreshFromCloud = () => {
    if (!CLOUD_ENABLED) return;
    setSyncStatus('loading');
    cloudGet()
      .then(cloudData => {
        if (cloudData && cloudData.days) {
          skipNextSave.current = true;
          setData(ensureSchema(cloudData));
        }
        setSyncStatus('synced');
        setSyncMsg("");
        toast("已重新整理");
      })
      .catch(err => {
        setSyncStatus('error');
        setSyncMsg(err.message || "讀取失敗");
      });
  };

  const updateData = useCallback((updater) => {
    setData(d => typeof updater === 'function' ? updater(d) : updater);
  }, []);

  const handleItemSave = (dayId, itemId, draft) => {
    updateData(d => ({
      ...d,
      days: d.days.map(day => day.id !== dayId ? day : {
        ...day,
        items: day.items.map(it => it.id !== itemId ? it : {...draft, id: itemId}),
      }),
    }));
    setEditingId(null);
    toast("已儲存");
  };

  const handleItemDelete = (dayId, itemId) => {
    setConfirm({
      title: "刪除這個行程？",
      body: "刪除後將無法復原，但你可以隨時新增。",
      danger: true,
      onConfirm: () => {
        updateData(d => ({
          ...d,
          days: d.days.map(day => day.id !== dayId ? day : {
            ...day,
            items: day.items.filter(it => it.id !== itemId),
          }),
        }));
        setConfirm(null);
        toast("已刪除");
      },
    });
  };

  const handleItemMove = (dayId, itemId, dir) => {
    updateData(d => ({
      ...d,
      days: d.days.map(day => {
        if (day.id !== dayId) return day;
        const idx = day.items.findIndex(it => it.id === itemId);
        if (idx < 0) return day;
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= day.items.length) return day;
        const newItems = [...day.items];
        [newItems[idx], newItems[newIdx]] = [newItems[newIdx], newItems[idx]];
        return {...day, items: newItems};
      }),
    }));
  };

  const handleItemToggleDone = (dayId, itemId) => {
    updateData(d => ({
      ...d,
      days: d.days.map(day => day.id !== dayId ? day : {
        ...day,
        items: day.items.map(it => it.id !== itemId ? it : {...it, done: !it.done}),
      }),
    }));
  };

  const handleItemAdd = (dayId) => {
    const newItem = {
      id: uid(),
      time: "",
      duration: 60,
      category: "景點",
      name: "新行程",
      notes: "",
    };
    updateData(d => ({
      ...d,
      days: d.days.map(day => day.id !== dayId ? day : {
        ...day,
        items: [...day.items, newItem],
      }),
    }));
    setEditingId(newItem.id);
    setTimeout(() => {
      const el = document.querySelector(`[data-item-id="${newItem.id}"]`);
      if (el) el.scrollIntoView({behavior: 'smooth', block: 'center'});
    }, 100);
  };

  const handleHsrUpdate = (newHsr) => {
    updateData(d => ({...d, hsr: newHsr}));
    toast("已儲存");
  };

  const handleRentalUpdate = (newRental) => {
    updateData(d => ({...d, rental: newRental}));
    toast("已儲存");
  };

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${data.title || 'trip'}_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("已匯出 JSON");
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed.days) throw new Error("檔案格式錯誤");
        setData(parsed);
        toast("匯入成功");
      } catch (err) {
        alert("匯入失敗：" + err.message);
      }
    };
    reader.readAsText(file);
    if (importRef.current) importRef.current.value = '';
  };

  const handleReset = () => {
    setConfirm({
      title: "重置為預設行程？",
      body: CLOUD_ENABLED
        ? "雲端資料會被覆蓋成預設行程，所有看這個網址的人都會跟著重置。建議先匯出 JSON 備份。"
        : "目前的編輯內容將會全部消失，且無法復原。建議先匯出 JSON 備份。",
      danger: true,
      onConfirm: () => {
        setData(JSON.parse(JSON.stringify(DEFAULT_DATA)));
        setConfirm(null);
        toast("已重置");
      },
    });
  };

  const totalItems = data.days.reduce((sum, d) => sum + d.items.length, 0);
  const doneItems = data.days.reduce((sum, d) => sum + d.items.filter(i => i.done).length, 0);

  return (
    <div className="app">
      <header className="hero">
        <div className="hero-eyebrow">Kenting · 墾丁旅行手帳</div>
        {editingTitle ? (
          <input
            className="hero-title hero-title-edit"
            value={data.title}
            onChange={e => updateData(d => ({...d, title: e.target.value}))}
            onBlur={() => setEditingTitle(false)}
            onKeyDown={e => { if (e.key === 'Enter') setEditingTitle(false); }}
            autoFocus
          />
        ) : (
          <h1 className="hero-title" onClick={() => setEditingTitle(true)} style={{cursor:'text'}}>{data.title}</h1>
        )}
        <div className="hero-meta">
          <span className="hero-meta-item"><Icon.Pin />{data.origin} → 墾丁</span>
          <span className="hero-meta-item"><Icon.Train />台中 ⇄ 左營</span>
          <span className="hero-meta-item"><Icon.Check />{doneItems}/{totalItems} 完成</span>
          <span className={`sync-pill sync-${syncStatus}`} title={syncMsg} onClick={refreshFromCloud} style={{cursor: CLOUD_ENABLED ? 'pointer' : 'default'}}>
            <span className="sync-dot"></span>
            {!CLOUD_ENABLED ? '本機模式' :
              syncStatus === 'loading' ? '載入雲端...' :
              syncStatus === 'saving' ? '同步中...' :
              syncStatus === 'synced' ? '已同步' :
              syncStatus === 'error' ? '同步失敗（點重試）' :
              '本機模式'}
          </span>
        </div>
        <div className="hero-actions">
          {CLOUD_ENABLED && <button className="btn btn-ghost btn-sm" onClick={refreshFromCloud} disabled={syncStatus === 'loading'}>重新整理</button>}
          <button className="btn btn-ghost btn-sm" onClick={handleExport}><Icon.Download/> 匯出</button>
          <button className="btn btn-ghost btn-sm" onClick={() => importRef.current?.click()}><Icon.Upload/> 匯入</button>
          <button className="btn btn-ghost btn-sm" onClick={handleReset}>重置</button>
          <input ref={importRef} type="file" accept="application/json,.json" style={{display:'none'}} onChange={handleImport} />
        </div>
      </header>

      <HSRCard hsr={data.hsr} onUpdate={handleHsrUpdate} />
      <RentalCard rental={data.rental} onUpdate={handleRentalUpdate} />

      {data.days.map((day, idx) => (
        <Day
          key={day.id}
          day={day}
          dayIndex={idx}
          editingId={editingId}
          onItemEdit={setEditingId}
          onItemCancelEdit={() => setEditingId(null)}
          onItemSave={handleItemSave}
          onItemDelete={handleItemDelete}
          onItemMove={handleItemMove}
          onItemToggleDone={handleItemToggleDone}
          onItemAdd={handleItemAdd}
          onPhotoClick={setPhotoModal}
        />
      ))}

      <div className="footer">
        全部資料存在這台瀏覽器
        <span className="footer-divider"></span>
        建議定期匯出 JSON 備份
      </div>

      {photoModal && <PhotoModal photos={photoModal.photos} initialIndex={photoModal.index} onClose={() => setPhotoModal(null)} />}
      {confirm && <ConfirmModal {...confirm} onCancel={() => setConfirm(null)} />}
      {toastNode}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
