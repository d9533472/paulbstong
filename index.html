<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d0a1f" />
<title>Paul's Hub ☁ 個人指揮台</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
:root {
  /* Base */
  --bg: #0d0a1f;
  --bg-2: #14102a;
  --surface: rgba(255, 255, 255, 0.04);
  --surface-2: rgba(255, 255, 255, 0.07);
  --surface-hover: rgba(255, 255, 255, 0.10);
  --border: rgba(255, 255, 255, 0.08);
  --border-2: rgba(255, 255, 255, 0.16);

  /* Text */
  --text: #f8fafc;
  --text-2: #cbd5e1;
  --text-3: #94a3b8;
  --text-4: #64748b;

  /* Vibrant palette */
  --cyan: #22d3ee;
  --cyan-glow: rgba(34, 211, 238, 0.4);
  --violet: #a78bfa;
  --violet-glow: rgba(167, 139, 250, 0.4);
  --coral: #fb7185;
  --coral-glow: rgba(251, 113, 133, 0.4);
  --amber: #fbbf24;
  --amber-glow: rgba(251, 191, 36, 0.4);
  --mint: #34d399;
  --mint-glow: rgba(52, 211, 153, 0.4);
  --pink: #f472b6;
  --pink-glow: rgba(244, 114, 182, 0.4);
  --blue: #60a5fa;
  --blue-glow: rgba(96, 165, 250, 0.4);

  /* Fonts */
  --display: "Sora", "Noto Sans TC", system-ui, sans-serif;
  --sans: "Plus Jakarta Sans", "Noto Sans TC", system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  letter-spacing: -0.01em;
  overflow-x: hidden;
}

/* Animated gradient orbs background */
body::before, body::after {
  content: "";
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}
body::before {
  width: 520px; height: 520px;
  background: radial-gradient(circle, var(--violet) 0%, transparent 70%);
  top: -180px; left: -120px;
  animation: float1 18s ease-in-out infinite;
}
body::after {
  width: 460px; height: 460px;
  background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
  bottom: -150px; right: -100px;
  animation: float2 22s ease-in-out infinite;
}
.orb-extra {
  content: "";
  position: fixed;
  width: 380px; height: 380px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
  filter: blur(100px);
  top: 40%; right: 20%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.25;
  animation: float3 26s ease-in-out infinite;
}

@keyframes float1 {
  0%, 100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(60px, 40px) scale(1.1); }
  66% { transform: translate(-30px, 80px) scale(0.95); }
}
@keyframes float2 {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-80px, -50px) scale(1.15); }
}
@keyframes float3 {
  0%, 100% { transform: translate(0,0); }
  33% { transform: translate(-100px, 60px); }
  66% { transform: translate(80px, -40px); }
}

#root { position: relative; z-index: 1; }

/* === Layout === */
.app {
  max-width: 1280px;
  margin: 0 auto;
  padding: 28px 24px 80px;
}
@media (max-width: 720px) { .app { padding: 18px 14px 64px; } }

/* === Header === */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 28px;
  padding: 16px 22px;
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 22px;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-mark {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  border-radius: 14px;
  display: grid;
  place-items: center;
  font-family: var(--display);
  font-size: 22px;
  font-weight: 800;
  color: #0d0a1f;
  box-shadow: 0 8px 24px -8px var(--violet-glow);
  position: relative;
  overflow: hidden;
}
.brand-mark::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
  animation: shine 3.5s ease-in-out infinite;
}
@keyframes shine {
  0%, 100% { transform: translateX(-100%); }
  50% { transform: translateX(100%); }
}
.brand-name {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff, #cbd5e1);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.header-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--surface-2);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.05em;
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--mint);
  box-shadow: 0 0 10px var(--mint);
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

/* Cloud sync pill */
.sync-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.05em;
  transition: all 0.25s;
}
.sync-pill .sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-3);
}
.sync-pill[data-status="loading"] .sync-dot,
.sync-pill[data-status="saving"]  .sync-dot {
  background: var(--cyan);
  box-shadow: 0 0 10px var(--cyan);
  animation: pulse 1s ease-in-out infinite;
}
.sync-pill[data-status="synced"] .sync-dot {
  background: var(--mint);
  box-shadow: 0 0 8px var(--mint);
}
.sync-pill[data-status="error"] .sync-dot {
  background: var(--coral);
  box-shadow: 0 0 8px var(--coral);
}
.sync-pill[data-status="local"] .sync-dot { background: var(--text-4); }
.sync-pill[data-status="error"] { border-color: rgba(251, 113, 133, 0.4); }

.sync-refresh {
  background: transparent;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  font-size: 13px;
  width: 20px; height: 20px;
  border-radius: 50%;
  display: grid; place-items: center;
  margin-left: -2px;
  transition: all 0.2s;
}
.sync-refresh:hover { color: var(--cyan); transform: rotate(180deg); }
.sync-refresh:disabled { opacity: 0.4; cursor: not-allowed; }

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* Settings gear button */
.settings-btn {
  width: 36px; height: 36px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-2);
  cursor: pointer;
  font-size: 16px;
  display: grid; place-items: center;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.settings-btn:hover {
  background: var(--surface-hover);
  color: var(--cyan);
  transform: rotate(60deg);
}

/* Modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(5, 3, 15, 0.75);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: grid;
  place-items: center;
  z-index: 1000;
  padding: 16px;
  animation: backdropIn 0.2s ease;
}
@keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: linear-gradient(180deg, var(--bg-2), var(--bg));
  border: 1px solid var(--border-2);
  border-radius: 22px;
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: modalIn 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 20px 60px -10px rgba(0,0,0,0.6);
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.modal-close {
  width: 32px; height: 32px;
  border-radius: 10px;
  border: none;
  background: var(--surface-2);
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: grid; place-items: center;
}
.modal-close:hover { background: var(--coral); color: #fff; transform: scale(1.08) rotate(90deg); }

.modal-body {
  padding: 22px 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.modal-field { display: flex; flex-direction: column; gap: 6px; }
.modal-field label {
  font-family: var(--display);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
}
.modal-field label .optional {
  font-weight: 400;
  color: var(--text-3);
  font-size: 11px;
  margin-left: 4px;
}
.modal-field input {
  background: var(--bg);
  border: 1px solid var(--border-2);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12.5px;
  transition: all 0.2s;
  width: 100%;
}
.modal-field input::placeholder { color: var(--text-4); }
.modal-field input:focus {
  outline: none;
  border-color: var(--cyan);
  box-shadow: 0 0 0 4px var(--cyan-glow);
}
.modal-hint {
  font-size: 11px;
  color: var(--text-3);
  line-height: 1.5;
}
.modal-hint code {
  font-family: var(--mono);
  background: var(--surface-2);
  padding: 1px 6px;
  border-radius: 4px;
  color: var(--cyan);
  font-size: 10.5px;
}
.secret-row { display: flex; gap: 8px; }
.secret-row input { flex: 1; min-width: 0; }
.btn-icon {
  width: 44px; height: 44px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  color: var(--text);
  flex: 0 0 44px;
  transition: all 0.2s;
}
.btn-icon:hover { background: var(--surface-hover); }

.test-result {
  padding: 11px 14px;
  border-radius: 10px;
  font-size: 12px;
  font-family: var(--mono);
  line-height: 1.5;
}
.test-result.ok  { background: rgba(52, 211, 153, 0.12); color: var(--mint); border: 1px solid rgba(52, 211, 153, 0.3); }
.test-result.err { background: rgba(251, 113, 133, 0.12); color: var(--coral); border: 1px solid rgba(251, 113, 133, 0.3); }

.modal-status {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-3);
  padding: 10px 14px;
  background: var(--surface-2);
  border-radius: 10px;
  letter-spacing: 0.04em;
}
.modal-status .badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: 6px;
  font-size: 10px;
}
.modal-status .badge.on  { background: rgba(52, 211, 153, 0.15); color: var(--mint); }
.modal-status .badge.off { background: var(--surface-hover); color: var(--text-3); }

.modal-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  gap: 8px;
  flex-wrap: wrap;
}
.modal-actions { display: flex; gap: 8px; }

@media (max-width: 540px) {
  .header { flex-direction: column; align-items: stretch; gap: 12px; }
  .header-meta { align-self: flex-start; }
  .header-right { width: 100%; }
}

/* === Tab Nav === */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 4px;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  padding: 12px 20px;
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  color: var(--text-2);
  font-family: var(--display);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
.tab:hover {
  transform: translateY(-2px);
  background: var(--surface-2);
  color: var(--text);
}
.tab .tab-emoji {
  font-size: 18px;
  filter: grayscale(0.3);
  transition: filter 0.25s;
}
.tab:hover .tab-emoji, .tab.active .tab-emoji { filter: grayscale(0); }

.tab.active[data-color="cyan"]   { background: rgba(34, 211, 238, 0.15); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 8px 24px -8px var(--cyan-glow); }
.tab.active[data-color="violet"] { background: rgba(167, 139, 250, 0.15); border-color: var(--violet); color: var(--violet); box-shadow: 0 8px 24px -8px var(--violet-glow); }
.tab.active[data-color="coral"]  { background: rgba(251, 113, 133, 0.15); border-color: var(--coral); color: var(--coral); box-shadow: 0 8px 24px -8px var(--coral-glow); }
.tab.active[data-color="amber"]  { background: rgba(251, 191, 36, 0.15); border-color: var(--amber); color: var(--amber); box-shadow: 0 8px 24px -8px var(--amber-glow); }
.tab.active[data-color="mint"]   { background: rgba(52, 211, 153, 0.15); border-color: var(--mint); color: var(--mint); box-shadow: 0 8px 24px -8px var(--mint-glow); }

/* === Glass Card Base === */
.card {
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: all 0.25s ease;
}
.card-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}
.card-title h2 {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.card-title .meta {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-3);
  padding: 5px 10px;
  background: var(--surface-2);
  border-radius: 999px;
}

/* === Home Tab — Bento Grid === */
.bento {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: minmax(120px, auto);
  gap: 16px;
}
@media (max-width: 900px) { .bento { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 540px) { .bento { grid-template-columns: repeat(2, 1fr); } }

.bento-card {
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 22px;
  position: relative;
  overflow: hidden;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  flex-direction: column;
}
.bento-card::before {
  content: "";
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 30%, var(--accent-glow), transparent 50%);
  opacity: 0.6;
  pointer-events: none;
}
.bento-card:hover { transform: translateY(-3px); border-color: var(--accent); }

/* Hero clock - spans 4 cols x 2 rows */
.bento-clock {
  --accent: var(--cyan);
  --accent-glow: var(--cyan-glow);
  grid-column: span 4;
  grid-row: span 2;
  justify-content: space-between;
}
.bento-clock .greet {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--cyan);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
  position: relative;
}
.bento-clock .clock {
  font-family: var(--display);
  font-size: clamp(64px, 11vw, 124px);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.04em;
  background: linear-gradient(135deg, #fff 0%, var(--cyan) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-feature-settings: "tnum" 1;
  position: relative;
  margin: 8px 0;
}
.bento-clock .clock .sec {
  font-size: 0.45em;
  color: var(--coral);
  -webkit-text-fill-color: var(--coral);
  margin-left: 0.15em;
  font-weight: 700;
}
.bento-clock .date {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 500;
  color: var(--text-2);
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.bento-clock .date .roc {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  background: var(--surface-2);
  border-radius: 999px;
  color: var(--text-3);
}

@media (max-width: 900px) { .bento-clock { grid-column: span 3; } }

/* Stat cards */
.bento-stat {
  grid-column: span 2;
  cursor: default;
}
.bento-stat[data-c="weather"] { --accent: var(--blue); --accent-glow: var(--blue-glow); }
.bento-stat[data-c="todos"]   { --accent: var(--mint); --accent-glow: var(--mint-glow); }
.bento-stat[data-c="notes"]   { --accent: var(--amber); --accent-glow: var(--amber-glow); }
.bento-stat[data-c="links"]   { --accent: var(--coral); --accent-glow: var(--coral-glow); }
.bento-stat[data-c="quote"]   { --accent: var(--violet); --accent-glow: var(--violet-glow); grid-column: span 4; }
.bento-stat[data-c="weekday"] { --accent: var(--pink); --accent-glow: var(--pink-glow); }

@media (max-width: 900px) {
  .bento-stat { grid-column: span 1; }
  .bento-stat[data-c="quote"] { grid-column: span 3; }
}
@media (max-width: 540px) {
  .bento-stat[data-c="quote"] { grid-column: span 2; }
}

.stat-icon {
  font-size: 26px;
  margin-bottom: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 44px; height: 44px;
  background: var(--surface-2);
  border-radius: 14px;
  position: relative;
}
.stat-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
  position: relative;
}
.stat-value {
  font-family: var(--display);
  font-size: 38px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -0.03em;
  position: relative;
}
.stat-value .unit {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text-3);
  margin-left: 6px;
  font-weight: 500;
}
.stat-sub {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 8px;
  position: relative;
}

/* Quote card special */
.bento-stat[data-c="quote"] .quote-text {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text);
  position: relative;
  margin-top: 8px;
  letter-spacing: -0.01em;
}
.bento-stat[data-c="quote"] .quote-author {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--violet);
  letter-spacing: 0.08em;
  margin-top: 12px;
  position: relative;
}

// ====== Cloud Sync (Google Apps Script + Sheets) ======
function gasLoad() {
  // GET to load all tables. Uses fetch (cross-origin GET works fine).
  const url = CLOUD_CONFIG.gas_url + "?action=load" + (CLOUD_CONFIG.secret ? "&secret=" + encodeURIComponent(CLOUD_CONFIG.secret) : "");
  return fetch(url).then(r => r.json()).then(r => {
    if (r.error) throw new Error(r.error);
    return r.data || {};
  });
}
function gasSave(table, data) {
  // POST via XHR with text/plain to dodge CORS preflight (works on iOS Safari).
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("POST", CLOUD_CONFIG.gas_url, true);
    xhr.setRequestHeader("Content-Type", "text/plain;charset=utf-8");
    xhr.timeout = 15000;
    xhr.onload = () => {
      try {
        const r = JSON.parse(xhr.responseText);
        if (r.error) reject(new Error(r.error));
        else resolve(r);
      } catch (e) { reject(new Error("Invalid response")); }
    };
    xhr.onerror = () => reject(new Error("Network error"));
    xhr.ontimeout = () => reject(new Error("Timeout"));
    xhr.send(JSON.stringify({ action: "save", table, data, secret: CLOUD_CONFIG.secret || "" }));
  });
}

// ====== Settings Modal ======
function SettingsModal({ open, onClose }) {
  const [gasUrl, setGasUrl] = useState(CLOUD_CONFIG.gas_url || "");
  const [secret, setSecret] = useState(CLOUD_CONFIG.secret || "");
  const [showSecret, setShowSecret] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  if (!open) return null;

  const test = () => {
    const u = gasUrl.trim();
    if (!u) { setTestResult({ ok: false, msg: "請先輸入 GAS URL" }); return; }
    setTesting(true); setTestResult(null);
    const url = u + "?action=ping" + (secret ? "&secret=" + encodeURIComponent(secret) : "");
    fetch(url)
      .then(r => r.json())
      .then(data => {
        if (data.error) setTestResult({ ok: false, msg: "✗ 錯誤：" + data.error });
        else setTestResult({ ok: true, msg: "✓ 連線成功！伺服器時間 " + new Date(data.time).toLocaleTimeString("zh-TW") });
      })
      .catch(err => setTestResult({ ok: false, msg: "✗ 連線失敗：" + err.message }))
      .finally(() => setTesting(false));
  };

  const save = () => {
    const u = gasUrl.trim();
    ls.set("hq_gas_url", u);
    ls.set("hq_secret", secret);
    if (confirm("設定已儲存！需重新載入頁面才會生效，現在重新載入嗎？")) location.reload();
    else onClose();
  };

  const reset = () => {
    if (!confirm("清除雲端設定回到本機模式？\n（資料不會被刪除）")) return;
    localStorage.removeItem("hq_gas_url");
    localStorage.removeItem("hq_secret");
    if (confirm("已清除！要重新載入頁面嗎？")) location.reload();
    else onClose();
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2>⚙ 雲端同步設定</h2>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="modal-status">
            目前狀態
            <span className={`badge ${CLOUD_ENABLED ? "on" : "off"}`}>
              {CLOUD_ENABLED ? "雲端已啟用" : "本機模式"}
            </span>
          </div>

          <div className="modal-field">
            <label>Google Apps Script Web App URL</label>
            <input
              type="url"
              placeholder="https://script.google.com/macros/s/.../exec"
              value={gasUrl}
              onChange={e => setGasUrl(e.target.value)}
              spellCheck={false}
            />
            <div className="modal-hint">
              部署 <code>Code.gs</code> 後在 Apps Script 「部署 → 管理部署作業」取得的 URL。
            </div>
          </div>

          <div className="modal-field">
            <label>Shared Secret <span className="optional">（選填）</span></label>
            <div className="secret-row">
              <input
                type={showSecret ? "text" : "password"}
                placeholder="若 Code.gs 有設 SECRET，這裡填一樣的"
                value={secret}
                onChange={e => setSecret(e.target.value)}
                spellCheck={false}
              />
              <button className="btn-icon" onClick={() => setShowSecret(!showSecret)} title={showSecret ? "隱藏" : "顯示"}>
                {showSecret ? "🙈" : "👁"}
              </button>
            </div>
            <div className="modal-hint">
              對應 Code.gs 中的 <code>SECRET</code> 變數。可空（URL 即為唯一憑證）。
            </div>
          </div>

          <button className="btn btn-ghost" onClick={test} disabled={testing}>
            {testing ? "⏳ 測試中…" : "🔗 測試連線"}
          </button>
          {testResult && (
            <div className={`test-result ${testResult.ok ? "ok" : "err"}`}>
              {testResult.msg}
            </div>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-danger" onClick={reset}>清除設定</button>
          <div className="modal-actions">
            <button className="btn btn-ghost" onClick={onClose}>取消</button>
            <button className="btn" onClick={save}>儲存</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function ToolsTab({ tools, setTools }) {
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({ name: "", url: "", desc: "", tag: "", emoji: "" });

  const updateForm = (field, val) => setForm(f => ({...f, [field]: val}));
  const clearForm = () => { setForm({ name: "", url: "", desc: "", tag: "", emoji: "" }); setEditingId(null); };

  const submit = () => {
    const n = form.name.trim(), u = form.url.trim();
    if (!n || !u) { alert("名稱跟 URL 是必填的喔"); return; }
    const safeUrl = u.startsWith("http") ? u : `https://${u}`;
    const colors = ["cyan","violet","coral","amber","mint","pink","blue"];

    if (editingId) {
      setTools(tools.map(t => t.id === editingId ? {
        ...t,
        name: n,
        url: safeUrl,
        desc: form.desc.trim() || t.desc,
        tag: form.tag.trim() || t.tag,
        emoji: form.emoji.trim() || t.emoji,
      } : t));
    } else {
      const ids = tools.map(t => parseInt(t.id) || 0);
      const newId = String(Math.max(0, ...ids) + 1).padStart(2, "0");
      setTools([...tools, {
        id: newId,
        name: n,
        url: safeUrl,
        desc: form.desc.trim() || "—",
        tag: form.tag.trim() || "工具",
        emoji: form.emoji.trim() || "🔧",
        color: colors[Math.floor(Math.random() * colors.length)]
      }]);
    }
    clearForm();
  };

  const startEdit = (t) => {
    setEditingId(t.id);
    setForm({ name: t.name, url: t.url === "#" ? "" : t.url, desc: t.desc === "—" ? "" : t.desc, tag: t.tag, emoji: t.emoji });
    setTimeout(() => document.querySelector(".add-tool-form")?.scrollIntoView({ behavior: "smooth", block: "center" }), 50);
  };

  const remove = (id) => {
    const t = tools.find(x => x.id === id);
    if (!confirm(`刪除「${t?.name || "此工具"}」？`)) return;
    setTools(tools.filter(t => t.id !== id));
    if (editingId === id) clearForm();
  };

  const reset = () => {
    if (confirm("恢復為預設 15 個工具？目前的清單會被覆蓋。")) {
      setTools(DEFAULT_TOOLS);
      clearForm();
    }
  };

  return (
    <div className="tab-content">
      <div className="card-title">
        <h2>🛠 My Tools</h2>
        <span className="meta">{tools.length} systems</span>
      </div>

      <div className="tools-grid">
        {tools.map(t => (
          <a key={t.id} href={t.url} target="_blank" rel="noopener noreferrer" className={`tool-card tc-${t.color || "cyan"}`}>
            <div className="tool-actions">
              <button className="tool-action edit" onClick={(e) => { e.preventDefault(); startEdit(t); }} title="編輯">✎</button>
              <button className="tool-action del"  onClick={(e) => { e.preventDefault(); remove(t.id); }} title="刪除">×</button>
            </div>
            <div className="tool-emoji">{t.emoji}</div>
            <div className="tool-name">{t.name}</div>
            <div className="tool-desc">{t.desc}</div>
            <span className="tool-tag">{t.tag}</span>
          </a>
        ))}
      </div>

      <div className="add-tool-form">
        <div className="form-header">
          <span className="form-title">{editingId ? "✎ 編輯工具" : "＋ 新增工具"}</span>
          <div style={{display: "flex", gap: 8}}>
            {editingId && <button className="btn btn-ghost btn-sm" onClick={clearForm}>取消</button>}
            <button className="btn btn-ghost btn-sm" onClick={reset} title="恢復成原本內建的 15 個工具">↻ 恢復預設</button>
          </div>
        </div>
        <div className="form-grid">
          <input className="emoji-input"  type="text" placeholder="🔧"          value={form.emoji} onChange={e => updateForm("emoji", e.target.value)} maxLength={4} />
          <input className="name-input"   type="text" placeholder="名稱 *"       value={form.name}  onChange={e => updateForm("name", e.target.value)} />
          <input className="tag-input"    type="text" placeholder="標籤"         value={form.tag}   onChange={e => updateForm("tag", e.target.value)} />
          <input className="url-input"    type="url"  placeholder="https://... *" value={form.url}   onChange={e => updateForm("url", e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} />
          <input className="desc-input"   type="text" placeholder="描述（可選）"  value={form.desc}  onChange={e => updateForm("desc", e.target.value)} />
          <button className="btn submit-btn" onClick={submit}>{editingId ? "✓ 更新" : "＋ 新增"}</button>
        </div>
      </div>
    </div>
  );
}

// ====== Links Tab ======
function LinksTab({ links, setLinks }) {
  const [title, setTitle] = useState("");
  const [url, setUrl] = useState("");

  const add = () => {
    const t = title.trim(), u = url.trim();
    if (!t || !u) return;
    const safeUrl = u.startsWith("http") ? u : `https://${u}`;
    const colors = ["cyan","violet","coral","amber","mint","pink","blue"];
    setLinks([...links, { id: Date.now(), title: t, url: safeUrl, icon: "◇", color: colors[Math.floor(Math.random()*colors.length)] }]);
    setTitle(""); setUrl("");
  };
  const remove = id => setLinks(links.filter(l => l.id !== id));

  return (
    <div className="tab-content">
      <div className="card-title">
        <h2>🔗 Quick Links</h2>
        <span className="meta">{links.length} bookmarks</span>
      </div>

      <div className="links-grid">
        {links.map(l => {
          const c = l.color || "cyan";
          return (
            <a key={l.id} href={l.url} target="_blank" rel="noopener noreferrer" className="link-card">
              <button className="link-delete" onClick={(e) => { e.preventDefault(); remove(l.id); }}>×</button>
              <div className="link-icon" style={{"--accent-bg": COLOR_BG[c], "--accent-color": COLOR_FG[c]}}>{l.icon || "◇"}</div>
              <div className="link-info">
                <div className="link-title">{l.title}</div>
                <div className="link-host">{getHost(l.url)}</div>
              </div>
            </a>
          );
        })}
      </div>

      <div className="add-form">
        <input type="text" placeholder="名稱" value={title} onChange={e => setTitle(e.target.value)} />
        <input type="url" placeholder="https://..." value={url} onChange={e => setUrl(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
        <button className="btn" onClick={add}>＋ 新增</button>
      </div>
    </div>
  );
}

// ====== Notes Tab ======
function NotesTab({ notes, setNotes }) {
  const [activeId, setActiveId] = useState(null);

  const active = notes.find(n => n.id === activeId);
  const sorted = [...notes].sort((a, b) => b.updated - a.updated);

  const create = () => {
    const n = { id: Date.now(), title: "新筆記", body: "", created: Date.now(), updated: Date.now() };
    setNotes([n, ...notes]); setActiveId(n.id);
  };
  const update = (field, value) => setNotes(notes.map(n => n.id === activeId ? { ...n, [field]: value, updated: Date.now() } : n));
  const remove = () => {
    if (!active) return;
    if (!confirm(`刪除「${active.title}」？`)) return;
    setNotes(notes.filter(n => n.id !== activeId));
    setActiveId(null);
  };

  return (
    <div className="tab-content">
      <div className="card-title">
        <h2>📝 Notes</h2>
        <button className="btn" onClick={create}>＋ 新增筆記</button>
      </div>
      <div className="notes-layout">
        <div className="notes-list">
          {sorted.length === 0 && (
            <div style={{padding: "30px 12px", textAlign: "center", color: "var(--text-3)", fontSize: 12}}>
              尚無筆記
            </div>
          )}
          {sorted.map(n => (
            <div key={n.id} className={`note-item ${n.id === activeId ? "active" : ""}`} onClick={() => setActiveId(n.id)}>
              <div className="note-item-title">{n.title || "未命名"}</div>
              <div className="note-item-preview">{(n.body || "").substring(0, 50) || "（空白）"}</div>
              <div className="note-item-date">{new Date(n.updated).toLocaleString("zh-TW", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })}</div>
            </div>
          ))}
        </div>
        <div className="note-editor">
          {active ? (
            <>
              <input className="note-title-input" value={active.title} onChange={e => update("title", e.target.value)} placeholder="標題" />
              <textarea className="note-body" value={active.body} onChange={e => update("body", e.target.value)} placeholder="開始寫點什麼…" />
              <div className="note-actions">
                <span className="meta">最後修改 {new Date(active.updated).toLocaleString("zh-TW")}</span>
                <button className="btn btn-danger" onClick={remove}>刪除</button>
              </div>
            </>
          ) : (
            <div className="empty-state">
              <span className="ico">📔</span>
              <h3>選一篇筆記</h3>
              <p>左側點選筆記，或建立新的開始記錄</p>
              <button className="btn" onClick={create}>＋ 新增筆記</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ====== Todos Tab ======
function TodosTab({ todos, setTodos }) {
  const [text, setText] = useState("");

  const add = () => {
    const t = text.trim(); if (!t) return;
    setTodos([{ id: Date.now(), text: t, done: false, created: Date.now() }, ...todos]);
    setText("");
  };
  const toggle = id => setTodos(todos.map(t => t.id === id ? { ...t, done: !t.done } : t));
  const remove = id => setTodos(todos.filter(t => t.id !== id));
  const clearDone = () => { if (confirm("清除所有已完成項目？")) setTodos(todos.filter(t => !t.done)); };

  const open = todos.filter(t => !t.done).length;
  const done = todos.length - open;

  return (
    <div className="tab-content">
      <div className="card-title">
        <h2>✅ Todos</h2>
        {done > 0 && <button className="btn btn-ghost" onClick={clearDone}>清除已完成</button>}
      </div>

      <div className="todo-input-row">
        <input type="text" placeholder="加一件待辦… (Enter 送出)" value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === "Enter" && add()} />
        <button className="btn" onClick={add}>＋ 新增</button>
      </div>

      <div className="todo-stats">
        <div className="todo-stat" data-t="open">
          <div className="icn">⚡</div>
          <div><div className="num">{open}</div><div className="lbl">進行中</div></div>
        </div>
        <div className="todo-stat" data-t="done">
          <div className="icn">✓</div>
          <div><div className="num">{done}</div><div className="lbl">已完成</div></div>
        </div>
        <div className="todo-stat" data-t="total">
          <div className="icn">∑</div>
          <div><div className="num">{todos.length}</div><div className="lbl">總計</div></div>
        </div>
      </div>

      <div className="todo-list">
        {todos.length === 0 && (
          <div className="empty-state">
            <span className="ico">🎉</span>
            <h3>清單是空的</h3>
            <p>新增一件事開始今天的工作</p>
          </div>
        )}
        {todos.map(t => (
          <div key={t.id} className={`todo-item ${t.done ? "done" : ""}`}>
            <button className={`todo-check ${t.done ? "checked" : ""}`} onClick={() => toggle(t.id)} aria-label="toggle" />
            <span className="todo-text">{t.text}</span>
            <span className="todo-date">{new Date(t.created).toLocaleDateString("zh-TW", { month: "2-digit", day: "2-digit" })}</span>
            <button className="todo-remove" onClick={() => remove(t.id)} aria-label="remove">×</button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ====== App ======
function App() {
  const [active, setActive] = useState(() => ls.get("hq_active_tab", "home"));
  const [now, setNow] = useState(new Date());
  const [showSettings, setShowSettings] = useState(false);

  // Lifted state — all four data tables live here so we can sync centrally
  const [tools, setTools] = useState(() => ls.get("hq_tools", DEFAULT_TOOLS));
  const [links, setLinks] = useState(() => ls.get("hq_links", DEFAULT_LINKS));
  const [notes, setNotes] = useState(() => ls.get("hq_notes", []));
  const [todos, setTodos] = useState(() => ls.get("hq_todos", []));

  // Sync state
  const [syncStatus, setSyncStatus] = useState(CLOUD_ENABLED ? "loading" : "local");
  const [lastSync, setLastSync] = useState(null);
  const hydratedRef = useRef(!CLOUD_ENABLED); // local-only: ready immediately
  const inFlight = useRef(0);

  // Clock tick
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);

  // Persist active tab locally
  useEffect(() => { ls.set("hq_active_tab", active); }, [active]);

  // Persist data to localStorage on every change (cache for offline / next load)
  useEffect(() => { ls.set("hq_tools", tools); }, [tools]);
  useEffect(() => { ls.set("hq_links", links); }, [links]);
  useEffect(() => { ls.set("hq_notes", notes); }, [notes]);
  useEffect(() => { ls.set("hq_todos", todos); }, [todos]);

  // === Cloud: initial load ===
  const refreshFromCloud = () => {
    if (!CLOUD_ENABLED) return;
    setSyncStatus("loading");
    gasLoad()
      .then(data => {
        if (data.tools) setTools(data.tools);
        if (data.links) setLinks(data.links);
        if (data.notes) setNotes(data.notes);
        if (data.todos) setTodos(data.todos);
        hydratedRef.current = true;
        setSyncStatus("synced");
        setLastSync(new Date());
      })
      .catch(err => {
        console.warn("Cloud load failed:", err.message);
        hydratedRef.current = true; // allow local-only writes from now on
        setSyncStatus("error");
      });
  };
  useEffect(() => { refreshFromCloud(); /* once */ }, []);

  // === Cloud: debounced save per table ===
  const useCloudSave = (table, data) => {
    useEffect(() => {
      if (!CLOUD_ENABLED || !hydratedRef.current) return;
      const t = setTimeout(() => {
        inFlight.current++;
        setSyncStatus("saving");
        gasSave(table, data)
          .then(() => {
            inFlight.current = Math.max(0, inFlight.current - 1);
            if (inFlight.current === 0) {
              setSyncStatus("synced");
              setLastSync(new Date());
            }
          })
          .catch(err => {
            console.warn("Cloud save failed [" + table + "]:", err.message);
            inFlight.current = Math.max(0, inFlight.current - 1);
            setSyncStatus("error");
          });
      }, CLOUD_CONFIG.debounce_ms);
      return () => clearTimeout(t);
    }, [data]);
  };
  useCloudSave("tools", tools);
  useCloudSave("links", links);
  useCloudSave("notes", notes);
  useCloudSave("todos", todos);

  return (
    <div className="app">
      <Header
        now={now}
        syncStatus={syncStatus}
        onRefresh={refreshFromCloud}
        lastSync={lastSync}
        onSettingsClick={() => setShowSettings(true)}
      />
      <TabNav active={active} setActive={setActive} />

      {active === "home" && (
        <HomeTab
          now={now}
          notesCount={notes.length}
          todosCount={todos.length}
          todosOpen={todos.filter(t => !t.done).length}
          linksCount={links.length}
        />
      )}
      {active === "tools" && <ToolsTab tools={tools} setTools={setTools} />}
      {active === "links" && <LinksTab links={links} setLinks={setLinks} />}
      {active === "notes" && <NotesTab notes={notes} setNotes={setNotes} />}
      {active === "todos" && <TodosTab todos={todos} setTodos={setTodos} />}

      <div className="footer">
        <div>© {now.getFullYear()} PAUL TONG · 童保舜 · Crafted with <span className="heart">♥</span></div>
        <div>v3.1 · {CLOUD_ENABLED ? "Cloud Sync" : "Local Mode"}</div>
      </div>

      <SettingsModal open={showSettings} onClose={() => setShowSettings(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
