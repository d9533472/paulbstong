<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #03080f; }
  </style>
</helmet>
<x-import
  component-from-global-scope="Stage"
  from="./animations.jsx"
  width="{{ w }}"
  height="{{ h }}"
  duration="{{ dur }}"
  background="{{ bg }}"
  persistKey="greenhouse"
  hint-size="100%,100%">
  <x-import component="GreenhouseScene" from="./GreenhouseScene.jsx" hint-size="100%,100%"></x-import>
</x-import>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      w: 1280,
      h: 720,
      dur: 18,
      bg: "radial-gradient(125% 105% at 72% -8%, #102a44 0%, #08182a 48%, #03080f 100%)",
    };
  }
}
</script>
</body>
</html>
