  ca:{zh:"降溫背心",en:"Cooling vest",th:"เสื้อกั๊กลดอุณหภูมิ (Cooling vest)"},
  keys:["降溫背心","冷卻背心","涼感背心","coolingvest","coolvest","ลดอุณหภูมิ","ระบายความร้อน","ทำความเย็น"]},
 {id:20,type:"drag",
  t:{zh:"請將現場人員感到不適時的通報流程,拖拉排出正確順序:",
     en:"Drag the boxes into the correct order of the reporting flow when a worker feels unwell:",
     th:"ลากกล่องเรียงลำดับขั้นตอนการแจ้งเหตุเมื่อพนักงานรู้สึกไม่สบาย ให้ถูกต้อง:"},
  items:{zh:["人員感到不適","通報同伴/主管","停止作業","移至陰涼處","補水與降溫","必要時求醫協助"],
         en:["Worker feels unwell","Report to buddy / supervisor","Stop work","Move to a shaded/cool area","Rehydrate & cool down","Seek medical help if needed"],
         th:["พนักงานรู้สึกไม่สบาย","แจ้งเพื่อนร่วมงาน / หัวหน้างาน","หยุดงาน","ย้ายไปที่ร่ม","ดื่มน้ำและลดอุณหภูมิ","ขอความช่วยเหลือทางการแพทย์หากจำเป็น"]}}
];

/* ====== helpers ====== */
function normalize(s){
  return (s||"").toLowerCase()
    .replace(/[\s、,。.!?()（）\/\\\-_~〜]/g,"")
    .replace(/温/g,"溫").replace(/涼/g,"涼");
}
function gradeFill(q,val){
  const n = normalize(val);
  if(!n) return false;
  return q.keys.some(k=>n.includes(normalize(k)));
}
function fmtTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}
function shuffle(arr){
  let a;
  do{
    a=[...arr];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  }while(a.every((v,i)=>v===i));
  return a;
}
function postGAS(payload,cb){
  try{
    const xhr = new XMLHttpRequest();
    xhr.open("POST",GAS_URL,true);
    xhr.setRequestHeader("Content-Type","text/plain;charset=utf-8");
    xhr.onreadystatechange = function(){
      if(xhr.readyState===4) cb(xhr.status>=200&&xhr.status<300, xhr.responseText);
    };
    xhr.onerror = ()=>cb(false,"");
    xhr.send(JSON.stringify(payload));
  }catch(e){cb(false,"");}
}

/* ====== Drag-sort component (pointer-based, iPhone-friendly) ====== */
function DragSort({items,order,setOrder}){
  const [drag,setDrag] = useState(null); // {idx, y0, dy}
  const rowH = useRef(56);
  const listRef = useRef(null);

  const onDown = (e,idx)=>{
    const row = e.currentTarget;
    rowH.current = row.offsetHeight + 8;
    row.setPointerCapture(e.pointerId);
    setDrag({idx, y0:e.clientY, dy:0});
  };
  const onMove = (e)=>{
    if(!drag) return;
    const dy = e.clientY - drag.y0;
    const shift = Math.round(dy/rowH.current);
    const target = Math.min(order.length-1, Math.max(0, drag.idx+shift));
    if(target!==drag.idx){
      const next=[...order];
      const [m]=next.splice(drag.idx,1);
      next.splice(target,0,m);
      setOrder(next);
      setDrag({idx:target, y0:e.clientY, dy:0});
    }else{
      setDrag({...drag, dy});
    }
  };
  const onUp = ()=> setDrag(null);

  return (
    <div ref={listRef}>
      {order.map((itemIdx,pos)=>(
        <div key={itemIdx}
          className={"dragbox"+(drag&&drag.idx===pos?" dragging":"")}
          style={drag&&drag.idx===pos?{transform:`translateY(${drag.dy}px)`}:{}}
          onPointerDown={(e)=>onDown(e,pos)}
          onPointerMove={onMove}
          onPointerUp={onUp}
          onPointerCancel={onUp}>
          <span className="ord">{pos+1}</span>
          <span style={{flex:1}}>{items[itemIdx]}</span>
          <span className="grip">≡</span>
        </div>
      ))}
    </div>
  );
}

/* ====== App ====== */
function App(){
  const [step,setStep] = useState("lang"); // lang -> region -> info -> quiz -> result
  const [lang,setLang] = useState(null);
  const [regionIdx,setRegionIdx] = useState(null);
  const [company,setCompany] = useState("");
  const [name,setName] = useState("");
  const [answers,setAnswers] = useState({});       // qid -> value
  const [dragOrder,setDragOrder] = useState(shuffle([0,1,2,3,4,5]));
  const [startTs,setStartTs] = useState(null);
  const [elapsed,setElapsed] = useState(0);
  const [result,setResult] = useState(null);
  const [sync,setSync] = useState("idle");
  const L = UI[lang||"zh"];

  useEffect(()=>{
    if(step!=="quiz") return;
    const iv = setInterval(()=>setElapsed(Math.floor((Date.now()-startTs)/1000)),1000);
    return ()=>clearInterval(iv);
  },[step,startTs]);

  const startQuiz = ()=>{
    setStartTs(Date.now());
    setElapsed(0);
    setStep("quiz");
    window.scrollTo(0,0);
  };

  const grade = ()=>{
    const detail=[]; let correct=0;
    Q.forEach(q=>{
      let ok=false, userDisp="";
      if(q.type==="mc"){
        const v=answers[q.id];
        ok = v===q.ans;
        userDisp = v==null?"—":"("+["A","B","C","D"][v]+") "+q.o[lang][v];
      }else if(q.type==="tf"){
        const v=answers[q.id];
        ok = v===q.ans;
        userDisp = v==null?"—":(v?L.true_:L.false_);
      }else if(q.type==="fill"){
        const v=answers[q.id]||"";
        ok = gradeFill(q,v);
        userDisp = v||"—";
      }else if(q.type==="drag"){
        ok = dragOrder.every((v,i)=>v===i);
        userDisp = dragOrder.map(i=>q.items[lang][i]).join(" → ");
      }
      if(ok) correct++;
      detail.push({id:q.id, ok, user:userDisp});
    });
    return {score:correct*5, correct, detail};
  };

  const submit = ()=>{
    const unanswered = Q.some(q=>q.type!=="drag" && (answers[q.id]==null || answers[q.id]===""));
    if(unanswered && !window.confirm(L.unanswered)) return;
    const dur = Math.floor((Date.now()-startTs)/1000);
    const r = grade();
    setResult({...r, dur});
    setStep("result");
    setSync("syncing");
    window.scrollTo(0,0);
    postGAS({
      action:"submit",
      timestamp:new Date().toISOString(),
      language:lang,
      region:REGION_CANON[regionIdx],
      company:company.trim(),
      name:name.trim(),
      score:r.score,
      correct:r.correct,
      durationSec:dur,
      detail:r.detail
    },(ok)=> setSync(ok?"ok":"err"));
  };

  const Header = ()=>(
    <React.Fragment>
      <div className="brand">{L.campaign}</div>
      <h1 className="title">{L.title}</h1>
    </React.Fragment>
  );

  /* ---- STEP: language ---- */
  if(step==="lang") return (
    <div><div className="stripe"></div><div className="wrap" style={{position:"relative"}}>
      <a href="heat-quiz-admin.html" title="後台總表" aria-label="Admin"
        style={{position:"absolute",top:"14px",right:"16px",fontSize:"20px",textDecoration:"none",
        color:"var(--muted)",border:"1.5px solid var(--line)",borderRadius:"10px",
        width:"40px",height:"40px",display:"flex",alignItems:"center",justifyContent:"center",background:"#fff"}}>⚙</a>
      <div className="brand">NMDC ENERGY HSE</div>
      <h1 className="title">七月熱危害Campaign有獎徵答<br/>
        <span style={{fontSize:"16px",fontWeight:700,color:"var(--muted)"}}>July Heat Hazard Campaign Quiz</span></h1>
      <div className="sub">2026 Summer Heat Stress Prevention</div>
      <div className="card">
        <div className="label">{UI.zh.pickLang}</div>
        {[["zh","中文"],["en","English"],["th","ภาษาไทย"]].map(([k,label])=>(
          <button key={k} className="bigbtn" onClick={()=>{setLang(k);setStep("region");}}>{label}</button>
        ))}
      </div>
    </div></div>
  );

  /* ---- STEP: region ---- */
  if(step==="region") return (
    <div><div className="stripe"></div><div className="wrap">
      <Header/>
      <div className="card">
        <div className="label">{L.pickRegion}</div>
        {L.region.map((r,i)=>(
          <button key={i} className={"bigbtn"+(regionIdx===i?" sel":"")}
            onClick={()=>{setRegionIdx(i);setStep("info");}}>{r}</button>
        ))}
      </div>
      <button className="bigbtn" style={{border:"none",color:"var(--muted)"}} onClick={()=>setStep("lang")}>← {L.back}</button>
    </div></div>
  );

  /* ---- STEP: info ---- */
  if(step==="info") return (
    <div><div className="stripe"></div><div className="wrap">
      <Header/>
      <div className="card">
        <div className="label">{L.region[regionIdx]}</div>
        <div className="fieldlbl">{L.company}</div>
        <input className="field" value={company} placeholder={L.companyPh}
          onChange={e=>setCompany(e.target.value)}/>
        <div className="fieldlbl">{L.name}</div>
        <input className="field" value={name} placeholder={L.namePh}
          onChange={e=>setName(e.target.value)}/>
        <div className="note">⏱ {L.timerNote}</div>
        <button className="go amber" disabled={!company.trim()||!name.trim()} onClick={startQuiz}>{L.start}</button>
      </div>
      <button className="bigbtn" style={{border:"none",color:"var(--muted)"}} onClick={()=>setStep("region")}>← {L.back}</button>
    </div></div>
  );

  /* ---- STEP: quiz ---- */
  if(step==="quiz"){
    const answeredCount = Q.filter(q=>q.type==="drag"||((answers[q.id]!=null)&&answers[q.id]!=="")).length;
    return (
      <div>
        <div className="timerbar">
          <span>{name}・{REGION_CANON[regionIdx]}</span>
          <span>{L.elapsed} <span className="t">{fmtTime(elapsed)}</span></span>
        </div>
        <div className="stripe"></div>
        <div className="wrap">
          <div className="progress"><div style={{width:(answeredCount/20*100)+"%"}}></div></div>
          {Q.map((q,qi)=>(
            <div className="qcard" key={q.id}>
              <span className="qnum">{L.question} {q.id} / 20 · {q.type==="mc"?L.mc:q.type==="tf"?L.tf:q.type==="fill"?L.fill:L.drag}</span>
              <div className="qtext">{q.t[lang]}</div>
              {q.type==="mc" && q.o[lang].map((opt,oi)=>(
                <button key={oi} className={"opt"+(answers[q.id]===oi?" sel":"")}
                  onClick={()=>setAnswers({...answers,[q.id]:oi})}>
                  ({["A","B","C","D"][oi]}) {opt}
                </button>
              ))}
              {q.type==="tf" && (
                <div className="tfrow">
                  <button className={"tf"+(answers[q.id]===true?" sel":"")}
                    onClick={()=>setAnswers({...answers,[q.id]:true})}>{L.true_}</button>
                  <button className={"tf"+(answers[q.id]===false?" sel":"")}
                    onClick={()=>setAnswers({...answers,[q.id]:false})}>{L.false_}</button>
                </div>
              )}
              {q.type==="fill" && (
                <input className="field" value={answers[q.id]||""} placeholder={L.fillPh}
                  onChange={e=>setAnswers({...answers,[q.id]:e.target.value})}/>
              )}
              {q.type==="drag" && (
                <DragSort items={q.items[lang]} order={dragOrder} setOrder={setDragOrder}/>
              )}
            </div>
          ))}
          <button className="go amber" onClick={submit}>{L.submit}</button>
        </div>
      </div>
    );
  }

  /* ---- STEP: result ---- */
  if(step==="result") return (
    <div><div className="stripe"></div><div className="wrap">
      <Header/>
      <div className="card score-hero">
        <div style={{fontSize:"14px",fontWeight:900,color:"var(--ok)",marginBottom:"6px"}}>{L.done}</div>
        <div className="big">{result.score}</div>
        <div className="of">{L.of}</div>
        <div className="statrow">
          <div className="stat"><div className="v">{fmtTime(result.dur)}</div><div className="k">{L.time}</div></div>
          <div className="stat"><div className="v">{result.correct} / 20</div><div className="k">{L.correct}</div></div>
        </div>
        <div className={"syncmsg "+(sync==="ok"?"ok":sync==="err"?"err":"")}>
          {sync==="syncing"?L.syncing:sync==="ok"?L.synced:sync==="err"?L.syncFail:""}
        </div>
      </div>
      <div className="card" style={{padding:"6px 4px"}}>
        <div className="label" style={{padding:"10px 12px 0"}}>{L.review}</div>
        {result.detail.map((d)=>{
          const q = Q.find(x=>x.id===d.id);
          let ca="";
          if(q.type==="mc") ca="("+["A","B","C","D"][q.ans]+") "+q.o[lang][q.ans];
          else if(q.type==="tf") ca=q.ans?L.true_:L.false_;
          else if(q.type==="fill") ca=q.ca[lang];
          else ca=q.items[lang].join(" → ");
          return (
            <div className="rev" key={d.id}>
              <span className={"mark "+(d.ok?"ok":"no")}>{d.ok?"✓":"✗"}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700}}>Q{d.id}</div>
                {!d.ok && <div className="ca">{L.correctAns}: {ca}</div>}
              </div>
              <span style={{fontWeight:900,color:d.ok?"var(--ok)":"var(--alert)"}}>{d.ok?"+5":"0"}</span>
            </div>
          );
        })}
      </div>
    </div></div>
  );

  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
